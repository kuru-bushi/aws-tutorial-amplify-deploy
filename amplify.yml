version: 1
# モノレポ構成: リポジトリルート = このファイルの場所、アプリ本体 = my-amplify-app
applications:
  - appRoot: my-amplify-app
    backend:
      phases:
        build:
          commands:
            # package-lock.json が非同期でも継続できるよう npm ci ではなく npm install を使用
            - npm install --cache .npm --prefer-offline
            # Amplify Gen 2 バックエンドをデプロイ（amplify_outputs.json を生成）
            - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
    frontend:
      phases:
        preBuild:
          commands:
            - npm install --cache .npm --prefer-offline
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - .npm/**/*
          - node_modules/**/*
